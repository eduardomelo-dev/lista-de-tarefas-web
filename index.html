<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tarefas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="hero" aria-labelledby="page-title">
      <p class="eyebrow">Projeto JavaScript</p>
      <h1 id="page-title">Lista de Tarefas</h1>
      <p>Organize atividades simples, acompanhe o progresso e mantenha tudo salvo no navegador.</p>
    </section>

    <section class="task-panel" aria-label="Gerenciador de tarefas">
      <form class="task-form" id="task-form">
        <label for="task-input">Nova tarefa</label>
        <div class="task-input-row">
          <input id="task-input" type="text" placeholder="Ex: estudar Java por 30 minutos" autocomplete="off" required>
          <button type="submit">Adicionar</button>
        </div>
      </form>

      <div class="summary" aria-live="polite">
        <span id="total-count">0 tarefas</span>
        <span id="done-count">0 concluídas</span>
      </div>

      <div class="filters" aria-label="Filtros de tarefas">
        <button class="filter-button active" type="button" data-filter="all">Todas</button>
        <button class="filter-button" type="button" data-filter="open">Pendentes</button>
        <button class="filter-button" type="button" data-filter="done">Concluídas</button>
      </div>

      <ul class="task-list" id="task-list" aria-label="Lista de tarefas"></ul>
      <p class="empty-state" id="empty-state">Nenhuma tarefa por aqui ainda.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
